<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}" />
</head>
<body>
    <div id="wrapper">
        <div id="header">
            <div id="menu">
                <a href="/">Главная</a>
                <a href="/users">Пользователи</a>
                <a href="/add_user">Регистрация</a>
                <a href="/login">Вход</a>
                <a href="/logout/">Выйти</a>
            </div>
        </div>

        <div id="content">
            <table>
                <tr>
                    <th>ID</th>
                    <th>Логин</th>
                    <th>Имя</th>
                    <th>Фамилия</th>
                    <th>Роль</th>
                    <th>Возраст</th>
                    <th>Баланс</th>
                    <th></th>
                    <th></th>
                </tr>
                {% for user in users %}
                    <tr>
                        <td>{{ user.id }}</td>
                        <td>{{ user.login }}</td>
                        <td>{{ user.first_name }}</td>
                        <td>{{ user.last_name }}</td>
                        <td>{{ user.role }}</td>
                        <td>{{ user.age }}</td>
                        <td>{{ user.balance }}</td>
                        <td><a href="/edit_user/{{user.id}}">Редактировать</a></td>
                        <td><a href="/delete_user/{{ user.id }}/">Удалить</a></td>
                    </tr>
                {% endfor %}
            </table>
        </div>
        <div id="footer"></div>
    </div>
</body>
</html>
